<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ibrand - Android Applications Developer</title>
    <style>
        :root {
            --primary-blue: #3498db;
            --primary-orange: #FF8C42;
            --text-white: #ffffff;
            --text-gray: rgba(255, 255, 255, 0.8);
            --nav-hover: rgba(255, 255, 255, 0.2);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        body, html {
            height: 100%;
            overflow: hidden;
        }

        .background {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(rgba(0, 0, 0, 0.5), rgba(0, 0, 0, 0.5)), url('banner.jpg');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            z-index: -1;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 50px;
            background: transparent;
        }

        .logo-container {
            display: flex;
            align-items: center;
        }

        .logo-icon {
            width: 40px;
            height: 40px;
            background: var(--primary-blue);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-weight: bold;
            color: white;
            font-size: 20px;
            margin-right: 12px;
            box-shadow: 0 0 15px rgba(52, 152, 219, 0.5);
        }

        .logo-text h1 {
            color: var(--text-white);
            font-size: 24px;
            letter-spacing: 1px;
        }

        .logo-text p {
            color: var(--text-gray);
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        nav ul {
            display: flex;
            list-style: none;
        }

        nav ul li {
            margin-left: 30px;
        }

        nav ul li a {
            text-decoration: none;
            color: var(--text-white);
            font-size: 16px;
            font-weight: 500;
            transition: all 0.3s ease;
            padding: 8px 16px;
            border-radius: 20px;
        }

        nav ul li a:hover {
            background: var(--nav-hover);
            color: var(--primary-blue);
        }

        main {
            height: calc(100vh - 100px);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 0 20px;
        }

        .hero-title {
            font-size: 80px;
            color: var(--primary-orange);
            margin-bottom: 20px;
            font-weight: 700;
            text-shadow: 0 0 30px rgba(255, 140, 66, 0.4);
            animation: fadeInDown 1s ease-out;
        }

        .hero-subtitle {
            font-size: 20px;
            color: var(--text-white);
            max-width: 700px;
            line-height: 1.6;
            font-weight: 300;
            animation: fadeInUp 1s ease-out 0.5s both;
        }

        @keyframes fadeInDown {
            from { opacity: 0; transform: translateY(-30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* 响应式设计 */
        @media (max-width: 768px) {
            header {
                padding: 20px;
                flex-direction: column;
            }
            nav {
                margin-top: 20px;
            }
            .hero-title {
                font-size: 50px;
            }
            .hero-subtitle {
                font-size: 16px;
            }
        }
    </style>
</head>
<body>
    <div class="background"></div>
    
    <header>
        <div class="logo-container">
            <div class="logo-icon">IB</div>
            <div class="logo-text">
                <h1>ibrand</h1>
                <p>Android applications developer</p>
            </div>
        </div>
    </header>

    <main>
        <h2 class="hero-title">ibrand</h2>
        <p class="hero-subtitle">
            Application development allows us to make this world a little better. <br>
            We hope this is just the beginning!
        </p>
    </main>
</body>
</html>
